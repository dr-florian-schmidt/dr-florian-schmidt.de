<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Dr. Florian Schmidt</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }
        h1 {
            font-size: 28px;
            margin-bottom: 5px;
            font-weight: 600;
        }
        p {
            color: #a0a0a0;
            font-size: 16px;
            margin-top: 0;
            margin-bottom: 40px;
        }
        .btn {
            background-color: #ffffff;
            color: #121212;
            padding: 15px 30px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            font-size: 18px;
            display: inline-block;
            margin-bottom: 35px;
            transition: transform 0.2s;
        }
        .btn:active {
            transform: scale(0.95);
        }
        .link-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .link {
            color: #6bb4ff;
            text-decoration: none;
            font-size: 16px;
        }
    </style>
</head>
<body>

    <h1>Dr. Florian Schmidt</h1>
    <p>Tech Executive & Engineering Leader</p>

    <a href="florian.vcf" class="btn">Kontakt speichern</a>

    <div class="link-group">
        <a href="https://dr-florian-schmidt.de" class="link">Zum Profil (Webseite)</a>
        <a href="https://linkedin.com/in/dr-florian-schmidt" class="link">Auf LinkedIn vernetzen</a>
    </div>

</body>
</html>
