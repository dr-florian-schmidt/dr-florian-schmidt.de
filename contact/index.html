<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Dr. Florian Schmidt</title>
    
    <!-- Favicon wie auf der Hauptseite -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><circle cx=%2250%22 cy=%2250%22 r=%2248%22 fill=%22%230369a1%22/><text x=%2250%%22 y=%2250%%22 fill=%22white%22 font-family=%22sans-serif%22 font-weight=%22bold%22 font-size=%2245%22 text-anchor=%22middle%22 dominant-baseline=%22central%22>FS</text></svg>">

    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            
            /* Identischer Hintergrund wie auf der Hauptseite (mit relativem Pfad) */
            background: linear-gradient(to bottom, rgba(15, 23, 42, 0.5), rgba(15, 23, 42, 0.98)), url('../bg.jpg') center/cover no-repeat fixed;
            background-color: #0f172a; /* Fallback */
            color: #f8fafc;
            
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            box-sizing: border-box;
        }

        /* Styling für das Profilfoto */
        .avatar-container {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            overflow: hidden;
            margin-bottom: 25px;
            border: 3px solid #0ea5e9;
            box-shadow: 0 0 25px rgba(14, 165, 233, 0.25);
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #1e293b; 
        }

        .avatar-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        h1 {
            font-size: 28px;
            margin-top: 0;
            margin-bottom: 5px;
            font-weight: 600;
        }

        p {
            color: #e2e8f0;
            font-size: 16px;
            margin-top: 0;
            margin-bottom: 45px;
            max-width: 300px;
        }

        .btn {
            background-color: #0ea5e9;
            color: #ffffff;
            padding: 15px 35px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            font-size: 18px;
            display: inline-block;
            margin-bottom: 40px;
            transition: transform 0.2s, background-color 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            border: 1px solid #0ea5e9;
        }

        .btn:hover {
            background-color: #0284c7;
            border-color: #0284c7;
        }

        .btn:active {
            transform: scale(0.96);
        }

        .link-group {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .link {
            color: #0ea5e9;
            text-decoration: none;
            font-size: 16px;
            font-weight: 500;
        }
        
        .link:hover {
            color: #f8fafc;
        }

        .link:active {
            opacity: 0.7;
        }
    </style>
</head>
<body>

    <div class="avatar-container">
        <!-- Relativer Pfad zum Originalbild im Hauptverzeichnis -->
        <img src="../profil.jpg" alt="Dr. Florian Schmidt" class="avatar-img" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'120\' height=\'120\'><rect width=\'120\' height=\'120\' fill=\'%231e293b\'/><text x=\'50%\' y=\'50%\' fill=\'%2394a3b8\' font-size=\'12\' font-family=\'sans-serif\' dominant-baseline=\'middle\' text-anchor=\'middle\'>Photo</text></svg>'">
    </div>

    <h1>Dr. Florian Schmidt</h1>
    <p>Tech Executive & Engineering Leader</p>

    <a href="florianschmidt.vcf" class="btn">Save Contact</a>

    <div class="link-group">
        <!-- Neu: Dynamischer Email-Link -->
        <a href="#" class="link js-mail">Send an E-Mail</a>
        <!-- Der Link geht ins Hauptverzeichnis zur Landingpage -->
        <a href="../" class="link">Visit Full Profile</a>
        <a href="https://linkedin.com/in/dr-florian-schmidt" class="link">Connect on LinkedIn</a>
    </div>

    <!-- Obfuscation Script (Robuste Variante) -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var n = "contact";
            var d = "dr-florian-schmidt.de";
            var m = n + "@" + d;

            var mailBtns = document.querySelectorAll('.js-mail');
            mailBtns.forEach(function(btn) {
                // Wir setzen das Ziel direkt in das href-Attribut.
                // Dadurch verhält es sich wie ein normaler Link und Pop-up-Blocker mischen sich nicht ein.
                btn.setAttribute('href', 'mailto:' + m);
            });
        });
    </script>
</body>
</html>
